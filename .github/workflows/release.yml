name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate release contracts
        run: npm run validate

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --force --arch=x64 --version=40.6.0

      - name: Build frontend
        run: npm run build

      - name: Package Electron app without publishing
        run: npx electron-builder --config electron-builder.config.cjs --dir

      - name: Validate packaged files
        run: npm run validate:asar

      - name: Smoke test packaged native modules
        run: npm run validate:native

      - name: Build installer and publish verified package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --config electron-builder.config.cjs --prepackaged release/win-unpacked --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*.exe
